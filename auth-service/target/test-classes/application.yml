server:
  port: 0

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:h2:mem:auth;MODE=MySQL;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  # Disable real mail sending in tests — JavaMailSender is mocked per test
  mail:
    host: localhost
    port: 3025
    username: test@test.com
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

jwt:
  secret: taskflowsupersecretkeytaskflowsupersecretkeytaskflowsupersecretkey1234
  expiration: 86400000

app:
  default-admin-email: admin@taskflow.com
  default-admin-password: Admin123!

spring.cloud.discovery.enabled: false
spring.cloud.config.enabled: false
