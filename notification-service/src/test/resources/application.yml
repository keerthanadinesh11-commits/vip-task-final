server:
  port: 0

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:h2:mem:notifdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

jwt:
  secret: taskflowsupersecretkeytaskflowsupersecretkeytaskflowsupersecretkey1234
  expiration: 86400000
