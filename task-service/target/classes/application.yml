server:
  port: 8083

spring:
  application:
    name: task-service
  datasource:
    url: jdbc:mysql://localhost:3306/taskflow_task?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        max.block.ms: 5000
        request.timeout.ms: 5000
        delivery.timeout.ms: 10000

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:taskflowsupersecretkeytaskflowsupersecretkeytaskflowsupersecretkey1234}
  expiration: 86400000

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 3000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Exclude Kafka from health check
management:
  health:
    kafka:
      enabled: false

logging:
  level:
    com.taskflow.taskservice: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN

app:
  file-upload-dir: ./task-files
